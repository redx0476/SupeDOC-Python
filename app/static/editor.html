<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Proposal — Editor</title>
  <link rel="stylesheet" href="https://esm.sh/superdoc/style.css" />
  <style>
    * { box-sizing: border-box; }
    body { margin:0; font:14px/1.5 system-ui,Segoe UI,Roboto,sans-serif; background:#f3f4f6; }
    .bar { display:flex; align-items:center; gap:12px; padding:8px 14px; background:#fff; border-bottom:1px solid #e2e4ea; }
    .bar .title { font-weight:600; font-size:14px; }
    .bar .spacer { flex:1; }
    .bar button { background:#2f6fed; color:#fff; border:0; border-radius:6px; padding:7px 12px; font-size:13px; cursor:pointer; }
    .bar button:disabled { opacity:.5; cursor:not-allowed; }
    #toolbar { background:#fff; border-bottom:1px solid #e2e4ea; }
    #editor { height: calc(100vh - 96px); overflow:auto; }
    .msg { padding:24px; color:#444; }
  </style>
</head>
<body>
  <div class="bar">
    <span class="title" id="docTitle">Proposal</span>
    <span class="spacer"></span>
    <button id="download" disabled>Download .docx</button>
  </div>
  <div id="toolbar"></div>
  <div id="editor"><div class="msg">Loading editor…</div></div>

  <script type="module">
    import { SuperDoc } from "https://esm.sh/superdoc";

    const DOCX_MIME = "application/vnd.openxmlformats-officedocument.wordprocessingml.document";
    const params = new URLSearchParams(location.search);
    const docId = params.get("doc");
    const userName = params.get("user") || "Guest";
    const el = (id) => document.getElementById(id);

    if (!docId) {
      el("editor").innerHTML = '<div class="msg">Missing <code>?doc=&lt;id&gt;</code>.</div>';
      throw new Error("no doc id");
    }

    fetch(`/api/documents/${docId}`).then(r => r.json()).then(m => {
      if (m && m.title) { el("docTitle").textContent = m.title; document.title = m.title; }
    }).catch(() => {});

    let superdoc;
    try {
      superdoc = new SuperDoc({
        selector: "#editor",
        toolbar: "#toolbar",
        documents: [{
          id: docId,
          type: DOCX_MIME,
          url: `/api/documents/${docId}/base.docx`,
          name: "proposal.docx",
        }],
        documentMode: "editing",
        pagination: true,
        user: { name: userName },
        onReady: () => { el("download").disabled = false; },
        onException: ({ error }) => console.error("SuperDoc exception:", error),
      });
      window.superdoc = superdoc;
    } catch (e) {
      console.error("Failed to init SuperDoc:", e);
      el("editor").innerHTML = '<div class="msg">Editor failed to load. See console.</div>';
    }

    el("download").addEventListener("click", async () => {
      try {
        let out = await superdoc.exportEditorsToDOCX();
        let b = Array.isArray(out) ? out[0] : out;
        if (b && b.blob) b = b.blob;
        if (b instanceof ArrayBuffer) b = new Blob([b], { type: DOCX_MIME });
        const url = URL.createObjectURL(b);
        const a = document.createElement("a");
        a.href = url; a.download = (document.title || "proposal") + ".docx";
        a.click(); URL.revokeObjectURL(url);
      } catch (e) { console.error(e); }
    });
  </script>
</body>
</html>
